<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>TGW.AI</title>

  <style>
    body {
      background: #0f0f0f;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 50px;
    }

    input {
      width: 80%;
      padding: 10px;
      border-radius: 10px;
      border: none;
    }

    button {
      padding: 10px 20px;
      border-radius: 10px;
      border: none;
      background: #00ffcc;
      margin-top: 10px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <h1>🤖 TGW.AI</h1>
  <p>Trợ lý AI của Văn</p>

  <input id="input" placeholder="Nhập gì đó..." />
  <br><br>

  <button onclick="chat()">Gửi</button>

  <p id="output"></p>

  <script>
    function chat() {
      let text = document.getElementById("input").value.toLowerCase();
      let reply = "";

      if (text.includes("xin chào")) {
        reply = "Chào Văn 👋";
      } else if (text.includes("bạn là ai")) {
        reply = "Tôi là TGW.AI 🤖";
      } else if (text.includes("khỏe không")) {
        reply = "Tôi luôn ổn định 🔥";
      } else {
        reply = "Tôi chưa hiểu... hãy dạy tôi thêm!";
      }

      document.getElementById("output").innerText = "TGW.AI: " + reply;
    }
  </script>

</body>
