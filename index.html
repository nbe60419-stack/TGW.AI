<!DOCTYPE html>
<html lang="vi">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TG.AI</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#050816;
font-family:Arial;
overflow:hidden;
color:white;
}

/* BACKGROUND */

.bg{
position:fixed;
width:100%;
height:100%;
background:
radial-gradient(circle at center,
rgba(0,255,255,0.08),
transparent 60%);
animation:bg 6s infinite;
}

@keyframes bg{
0%{transform:scale(1);}
50%{transform:scale(1.05);}
100%{transform:scale(1);}
}

/* TOP */

.top{
position:absolute;
top:20px;
width:100%;
text-align:center;
z-index:2;
}

.logo{
font-size:28px;
font-weight:bold;
color:#00E5FF;
text-shadow:0 0 15px #00E5FF;
}

.status{
margin-top:5px;
font-size:13px;
opacity:0.7;
}

/* AVATAR */

.avatarBox{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-55%);
width:240px;
height:240px;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
box-shadow:
0 0 40px rgba(0,229,255,0.2),
inset 0 0 30px rgba(0,229,255,0.1);
}

.avatar{
width:180px;
transition:0.1s;
filter:drop-shadow(0 0 15px #00E5FF);
}

/* CHAT */

.chat{
position:absolute;
bottom:110px;
width:100%;
padding:15px;
max-height:30vh;
overflow-y:auto;
display:flex;
flex-direction:column;
}

.msg{
max-width:75%;
padding:12px;
margin:5px;
border-radius:15px;
animation:fade .2s;
}

.user{
align-self:flex-end;
background:#00E5FF;
color:black;
}

.bot{
align-self:flex-start;
background:rgba(255,255,255,0.05);
border:1px solid rgba(0,229,255,0.2);
}

@keyframes fade{
from{
opacity:0;
transform:translateY(10px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* INPUT */

.inputBox{
position:absolute;
bottom:20px;
width:100%;
display:flex;
gap:10px;
padding:12px;
}

input{
flex:1;
padding:14px;
border:none;
border-radius:14px;
background:rgba(255,255,255,0.05);
color:white;
outline:none;
}

button{
padding:14px 18px;
border:none;
border-radius:14px;
background:#00E5FF;
font-weight:bold;
}

</style>
</head>

<body>

<div class="bg"></div>

<div class="top">
<div class="logo">TG.AI</div>

<div class="status" id="status">
SYSTEM READY
</div>
</div>

<div class="avatarBox">

<img
id="avatar"
class="avatar"
src="https://i.imgur.com/Z7AzH2c.png">

</div>

<div class="chat" id="chat"></div>

<div class="inputBox">

<input
id="input"
placeholder="Nhập lệnh...">

<button onclick="send()">
Gửi
</button>

<button onclick="voice()">
🎤
</button>

</div>

<script>

const TG = {

mood:"normal",

// 🔥 DÁN API KEY THẬT
apiKey:"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",

model:"google/gemma-7b-it:free",

add(text,type){

let msg=document.createElement("div");

msg.className="msg "+type;

msg.innerText=text;

document
.getElementById("chat")
.appendChild(msg);

chat.scrollTop=chat.scrollHeight;
},

speak(text){

let tts=
new SpeechSynthesisUtterance(text);

tts.lang="vi-VN";
tts.rate=0.95;
tts.pitch=1.08;

// fake lip sync

let avatar=
document.getElementById("avatar");

let interval=setInterval(()=>{

avatar.style.transform=
`scale(${1+Math.random()*0.03})`;

},120);

tts.onend=()=>{

clearInterval(interval);

avatar.style.transform="scale(1)";
};

speechSynthesis.cancel();

speechSynthesis.speak(tts);
},

async askAI(text){

try{

let response =
await fetch(
"https://openrouter.ai/api/v1/chat/completions",
{

method:"POST",

headers:{

"HTTP-Referer":
"https://abc123.github.io/",

"X-Title":"TG.AI",

"Content-Type":"application/json",

"Authorization":
"Bearer "+this.apiKey
},

body:JSON.stringify({

model:this.model,

messages:[

{
role:"system",

content:
"Bạn là TG.AI. Bình tĩnh. Ngắn gọn. Có chiều sâu."
},

{
role:"user",
content:text
}
]
})
});

let data=
await response.json();

return data
.choices[0]
.message.content;

}catch(e){

return "Lỗi kết nối AI.";
}
}

};

/* SEND */

async function send(){

let input=
document.getElementById("input");

let text=
input.value.trim();

if(!text) return;

TG.add(text,"user");

document
.getElementById("status")
.innerText=
"THINKING...";

input.value="";

let reply=
await TG.askAI(text);

setTimeout(()=>{

TG.add(reply,"bot");

TG.speak(reply);

document
.getElementById("status")
.innerText=
"ACTIVE";

},300);
}

/* VOICE */

function voice(){

if(!(
'webkitSpeechRecognition'
in window
)){
alert("Không hỗ trợ voice");
return;
}

let rec=
new webkitSpeechRecognition();

rec.lang="vi-VN";

rec.onresult=(e)=>{

let text=
e.results[0][0]
.transcript;

document
.getElementById("input")
.value=text;

send();
};

rec.start();
}

/* BLINK */

setInterval(()=>{

let avatar=
document.getElementById("avatar");

avatar.style.opacity=0.4;

setTimeout(()=>{
avatar.style.opacity=1;
},120);

},3500);

</script>

</body>
</html>
