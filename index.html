<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>TGW.AI</title>

  <style>
    body {
      background: #0f0f0f;
      color: white;
      font-family: Arial, sans-serif;
      margin: 0;
    }

    #chat {
      height: 85vh;
      overflow-y: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
    }

    .msg {
      max-width: 70%;
      padding: 10px;
      margin: 5px;
      border-radius: 10px;
    }

    .user {
      background: #00ffcc;
      color: black;
      align-self: flex-end;
    }

    .bot {
      background: #222;
      align-self: flex-start;
    }

    #inputBox {
      display: flex;
      padding: 10px;
      background: #111;
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 10px;
      border: none;
    }

    button {
      margin-left: 10px;
      padding: 10px;
      border-radius: 10px;
      border: none;
      background: #00ffcc;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <div id="chat"></div>

  <div id="inputBox">
    <input id="input" placeholder="Nhập hoặc nói..." />
    <button onclick="chat()">Gửi</button>
    <button onclick="voice()">🎤</button>
  </div>

  <script>
    let memory = [];

    function addMessage(text, type) {
      let msg = document.createElement("div");
      msg.className = "msg " + type;
      msg.innerText = text;
      document.getElementById("chat").appendChild(msg);

      document.getElementById("chat").scrollTop =
        document.getElementById("chat").scrollHeight;
    }

    function speak(text) {
      let speech = new SpeechSynthesisUtterance(text);
      speech.lang = "vi-VN";
      speech.rate = 1;
      speech.pitch = 1;
      speechSynthesis.speak(speech);
    }

    function getReply(text) {
      if (text.includes("xin chào")) return "Chào Văn 👋";
      if (text.includes("bạn là ai")) return "Tôi là TGW.AI 🤖";
      if (text.includes("tên tôi là")) {
        let name = text.replace("tên tôi là", "").trim();
        memory.push(name);
        return "Tôi sẽ nhớ bạn là " + name;
      }
      if (text.includes("tôi là ai")) {
        if (memory.length > 0) {
          return "Bạn là " + memory[memory.length - 1];
        } else {
          return "Tôi chưa biết bạn là ai.";
        }
      }
      return "Tôi đang học thêm... hãy dạy tôi!";
    }

    function chat() {
      let input = document.getElementById("input");
      let text = input.value.trim().toLowerCase();
      if (text === "") return;

      addMessage(text, "user");

      let reply = getReply(text);

      setTimeout(() => {
        addMessage(reply, "bot");
        speak(reply);
      }, 500);

      input.value = "";
    }

    function voice() {
      let recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
      recognition.lang = "vi-VN";

      recognition.onresult = function(event) {
        let text = event.results[0][0].transcript.toLowerCase();
        document.getElementById("input").value = text;
        chat();
      };

      recognition.start();
    }
  </script>

</body>
</html>
