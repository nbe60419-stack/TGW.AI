<script>
function chat() {
  let input = document.getElementById("input");
  let output = document.getElementById("output");

  let text = input.value.trim().toLowerCase();

  if (text === "") {
    output.innerText = "TGW.AI: Bạn chưa nhập gì!";
    return;
  }

  let reply = "";

  if (text.includes("xin chào")) {
    reply = "Chào Văn 👋";
  } 
  else if (text.includes("bạn là ai")) {
    reply = "Tôi là TGW.AI - trợ lý của Văn 🤖";
  } 
  else if (text.includes("khỏe không")) {
    reply = "Tôi luôn hoạt động ổn định 🔥";
  } 
  else if (text.includes("tgw")) {
    reply = "TG.WHIET-STUDIO là hệ thống của Văn 💻";
  } 
  else {
    reply = "Tôi chưa hiểu... hãy dạy tôi thêm!";
  }

  output.innerText = "TGW.AI: " + reply;
}
</script>
